services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "46379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ MinIO (Midias S3) ------
  # IMPORTANTE: nome unico "crm-minio" para evitar conflito DNS com outros stacks
  crm-minio:
    image: minio/minio:latest
    command: server /data
    restart: always
    ports:
      - "49000:9000"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data

  # ------ Whisper Server (Transcrição de Audiências) ------
  # Roda WhisperX (whisper large-v3 + diarização pyannote) em FastAPI.
  # CPU-only por padrão. Primeiro boot baixa ~5GB de modelos em /models.
  crm-whisper:
    image: andreflustosa/chat-crm-juridico-whisper:latest
    build:
      context: ./apps/whisper
      dockerfile: Dockerfile
    restart: always
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - DEVICE=${WHISPER_DEVICE:-cpu}
      - COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - LANGUAGE=pt
      - DIARIZE=true
      - HF_TOKEN=${HF_TOKEN}
      - S3_ENDPOINT=http://crm-minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    volumes:
      - whisper_models:/models
    # depends_on em list simple — Docker Swarm nao suporta `condition: service_healthy`
    # em long-form (apenas Compose standalone suporta). Stack deploy falhava
    # silenciosamente quando havia condition: declarada aqui.
    depends_on:
      - crm-minio

  # ------ NestJS Core API ------
  crm-api:
    image: andreflustosa/chat-crm-juridico-api:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
      args:
        APP: api
    restart: always
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET nao definido}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-365d}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:43001/api}
      - S3_ENDPOINT=http://crm-minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - WEBHOOK_HMAC_REQUIRED=${WEBHOOK_HMAC_REQUIRED:-false}
      - TRANSCRIPTION_PROVIDER=${TRANSCRIPTION_PROVIDER:-whisper-local}
      - WHISPER_SERVICE_URL=${WHISPER_SERVICE_URL:-http://crm-whisper:8000}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-whisper-large-v3}
    # Volume persistente pra midia (audios/imagens do WhatsApp). Sem isso,
    # rollouts perdiam arquivos em transito (container antigo matava filesystem
    # antes do novo subir). Adicionado 2026-04-23.
    volumes:
      - crm_media:/var/lib/crm-media
    # depends_on em list simple — Docker Swarm nao suporta long-form com
    # condition. Usar deploy.restart_policy / healthcheck pra garantir ordem.
    depends_on:
      - postgres
      - redis

  # ------ NestJS Worker ------
  crm-worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
      args:
        APP: worker
    restart: always
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET nao definido}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:43001/api}
      - S3_ENDPOINT=http://crm-minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - TRANSCRIPTION_PROVIDER=${TRANSCRIPTION_PROVIDER:-whisper-local}
      - WHISPER_SERVICE_URL=${WHISPER_SERVICE_URL:-http://crm-whisper:8000}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-whisper-large-v3}
    # Worker nao precisa de volume de midia — busca via HTTP do crm-api
    # (GET /media/:id). Abordagem chatwoot-style pra evitar S3 + complexidade.
    depends_on:
      - postgres
      - redis

  # ------ Next.js Frontend ------
  crm-web:
    image: andreflustosa/chat-crm-juridico-web:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:43001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:43001}
    restart: always
    ports:
      - "${WEB_PORT:-43000}:3000"
    depends_on:
      - crm-api

  # ------ MCP Gestor de Trafego ------
  traffic-mcp-server:
    image: andreflustosa/chat-crm-juridico-traffic-mcp:latest
    build:
      context: ./traffic-mcp-server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${TRAFFIC_MCP_PORT:-43100}:3100"
    environment:
      - MCP_PORT=3100
      - MCP_AUTH_TOKEN=${TRAFFIC_MCP_AUTH_TOKEN:?TRAFFIC_MCP_AUTH_TOKEN nao definido}
      - MCP_PUBLIC_BASE_URL=${TRAFFIC_MCP_PUBLIC_BASE_URL:-https://andrelustosaadvogados.com.br/traffic-mcp}
      - MCP_PUBLIC_URL=${TRAFFIC_MCP_PUBLIC_URL:-https://andrelustosaadvogados.com.br/traffic-mcp/mcp}
      - MCP_OAUTH_AUTHORIZATION_TOKEN=${TRAFFIC_MCP_OAUTH_AUTHORIZATION_TOKEN:-}
      - TRAFFIC_MCP_MODE=crm
      - CRM_API_URL=${TRAFFIC_MCP_CRM_API_URL:-http://crm-api:3001}
      - CRM_API_KEY=${TRAFFIC_MCP_CRM_API_KEY:?TRAFFIC_MCP_CRM_API_KEY nao definido}
      - CACHE_TTL_MS=${TRAFFIC_MCP_CACHE_TTL_MS:-300000}
    depends_on:
      - crm-api

volumes:
  pgdata:
  redisdata:
  minio_data:
  whisper_models:
  crm_media:  # persistente pra audios/imagens (WhatsApp) — evita perda em rollouts
