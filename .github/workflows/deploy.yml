name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            # Clona ou Atualiza o Repositório
            if [ -d "chat-crm-juridico" ]; then
              cd chat-crm-juridico
              git pull origin master
            else
              git clone https://github.com/AndreLustosa/chat-crm-juridico.git
              cd chat-crm-juridico
            fi

            # Executa o script de deploy automatizado garantindo as permissões
            chmod +x deploy-vps.sh
            bash deploy-vps.sh
