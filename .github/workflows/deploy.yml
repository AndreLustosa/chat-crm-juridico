name: Build, Push and Deploy to VPS

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Runner instalado no próprio VPS → zero minutos cobrados pelo GitHub
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.suffix }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache local no VPS — muito mais rápido que GHA cache e sem custo
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.suffix }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.suffix }}-new,mode=max

      # Rotação do cache local (evita crescimento infinito)
      - name: Rotate local build cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.suffix }}
          mv /tmp/.buildx-cache-${{ matrix.suffix }}-new /tmp/.buildx-cache-${{ matrix.suffix }} 2>/dev/null || true

  cleanup-old-images:
    needs: build-and-push
    runs-on: self-hosted
    permissions:
      packages: write
    strategy:
      matrix:
        suffix: [api, worker, web]
    steps:
      - name: Delete old image versions (keep last 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}-${{ matrix.suffix }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^master$'
        continue-on-error: true

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: ${{ vars.PORTAINER_WEBHOOK_URL != '' }}
    steps:
      - name: Trigger Portainer stack redeploy
        run: |
          curl -s -X POST "${{ vars.PORTAINER_WEBHOOK_URL }}" || echo "Portainer webhook falhou (stack sera atualizada manualmente)"
