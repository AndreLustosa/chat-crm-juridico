name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # Pega desalinhamentos cedo: tipos do @crm/shared desatualizados em dist/,
  # imports quebrados apos cleanups, drift entre src/.ts e dist/.d.ts dos
  # workspaces. Sem isso, problemas como o do tenant_id em ShareTokenPayload
  # (achado em 2026-05-17) viajam pra prod silenciosamente — runtime nao
  # quebra porque dist/*.js esta OK, so o typecheck falha.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # npm install roda o `prepare` script do @crm/shared (prisma generate + tsc),
      # garantindo que packages/shared/dist/ esteja em sync com src/ antes
      # dos typechecks abaixo.
      - name: Install dependencies (gera dist/ do @crm/shared via prepare)
        run: npm install --no-audit --no-fund

      - name: Typecheck @crm/shared
        run: npx tsc --noEmit -p packages/shared

      - name: Typecheck apps/api
        run: npx tsc --noEmit -p apps/api

      - name: Typecheck apps/worker
        run: npx tsc --noEmit -p apps/worker

      - name: Typecheck apps/web
        run: npx tsc --noEmit -p apps/web

      - name: Typecheck + tests traffic-mcp-server
        working-directory: traffic-mcp-server
        run: |
          npm install --no-audit --no-fund
          npx tsc --noEmit
          npm test

  build-and-push:
    needs: typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            context: .
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
          - name: traffic-mcp
            context: ./traffic-mcp-server
            dockerfile: traffic-mcp-server/Dockerfile
            suffix: traffic-mcp
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:latest
          no-cache: true

  # Deploy automatico por SSH desabilitado.
  # O SSH da VPS falhou por autenticacao e nao deve ser mascarado no Actions.
  # Atualizacoes de producao devem ser feitas manualmente/Portainer ate a chave SSH ser corrigida.
