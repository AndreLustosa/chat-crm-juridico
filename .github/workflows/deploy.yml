name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # Pega desalinhamentos cedo: tipos do @crm/shared desatualizados em dist/,
  # imports quebrados apos cleanups, drift entre src/.ts e dist/.d.ts dos
  # workspaces. Sem isso, problemas como o do tenant_id em ShareTokenPayload
  # (achado em 2026-05-17) viajam pra prod silenciosamente — runtime nao
  # quebra porque dist/*.js esta OK, so o typecheck falha.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # npm install roda o `prepare` script do @crm/shared (prisma generate + tsc),
      # garantindo que packages/shared/dist/ esteja em sync com src/ antes
      # dos typechecks abaixo.
      - name: Install dependencies (gera dist/ do @crm/shared via prepare)
        run: npm install --no-audit --no-fund

      # Paraleliza 5 alvos no mesmo runner (4 tscs do monorepo + install/tsc/test
      # do traffic-mcp-server). Antes (sequencial): ~2min. Agora: tempo do mais
      # lento + overhead minimo. Logs vao pra arquivos separados; report final
      # mostra cada um em ::group:: pra facilitar debug quando falhar.
      - name: Typecheck + tests (5 alvos em paralelo)
        run: |
          set +e  # nao aborta no primeiro erro — coleta status de todos

          echo "Disparando 5 typechecks em paralelo..."
          npx tsc --noEmit -p packages/shared > /tmp/tc-shared.log 2>&1 &
          PID_SHARED=$!
          npx tsc --noEmit -p apps/api > /tmp/tc-api.log 2>&1 &
          PID_API=$!
          npx tsc --noEmit -p apps/worker > /tmp/tc-worker.log 2>&1 &
          PID_WORKER=$!
          npx tsc --noEmit -p apps/web > /tmp/tc-web.log 2>&1 &
          PID_WEB=$!
          # MCP server tem npm install proprio (deps separadas) + tsc + vitest
          (
            cd traffic-mcp-server &&
            npm install --no-audit --no-fund > /tmp/tc-mcp-install.log 2>&1 &&
            npx tsc --noEmit > /tmp/tc-mcp-tsc.log 2>&1 &&
            npm test > /tmp/tc-mcp-test.log 2>&1
          ) &
          PID_MCP=$!

          # Espera todos e coleta exit codes
          wait $PID_SHARED;  STATUS_SHARED=$?
          wait $PID_API;     STATUS_API=$?
          wait $PID_WORKER;  STATUS_WORKER=$?
          wait $PID_WEB;     STATUS_WEB=$?
          wait $PID_MCP;     STATUS_MCP=$?

          # Reporta status de cada um (visivel mesmo em sucesso)
          report() {
            local name="$1" status="$2" log="$3"
            if [ "$status" -eq 0 ]; then
              echo "✅ $name"
            else
              echo "::group::❌ $name (exit=$status)"
              cat "$log" 2>/dev/null || echo "(sem log)"
              echo "::endgroup::"
            fi
          }

          echo ""
          echo "=== Resultado dos typechecks ==="
          report "@crm/shared       " "$STATUS_SHARED" "/tmp/tc-shared.log"
          report "apps/api          " "$STATUS_API"    "/tmp/tc-api.log"
          report "apps/worker       " "$STATUS_WORKER" "/tmp/tc-worker.log"
          report "apps/web          " "$STATUS_WEB"    "/tmp/tc-web.log"
          if [ "$STATUS_MCP" -ne 0 ]; then
            echo "::group::❌ traffic-mcp-server (exit=$STATUS_MCP)"
            echo "--- npm install ---"
            cat /tmp/tc-mcp-install.log 2>/dev/null || echo "(sem log)"
            echo "--- tsc ---"
            cat /tmp/tc-mcp-tsc.log 2>/dev/null || echo "(sem log)"
            echo "--- vitest ---"
            cat /tmp/tc-mcp-test.log 2>/dev/null || echo "(sem log)"
            echo "::endgroup::"
          else
            echo "✅ traffic-mcp-server"
          fi

          # Falha se qualquer um quebrou
          TOTAL=$((STATUS_SHARED + STATUS_API + STATUS_WORKER + STATUS_WEB + STATUS_MCP))
          if [ "$TOTAL" -ne 0 ]; then
            echo ""
            echo "❌ Typecheck falhou — veja os logs acima."
            exit 1
          fi
          echo ""
          echo "✅ Todos os typechecks passaram."

  build-and-push:
    needs: typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            context: .
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
          - name: traffic-mcp
            context: ./traffic-mcp-server
            dockerfile: traffic-mcp-server/Dockerfile
            suffix: traffic-mcp
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:latest
          no-cache: true
          provenance: false
          sbom: false

  # Deploy automatico por SSH desabilitado.
  # O SSH da VPS falhou por autenticacao e nao deve ser mascarado no Actions.
  # Atualizacoes de producao devem ser feitas manualmente/Portainer ate a chave SSH ser corrigida.
