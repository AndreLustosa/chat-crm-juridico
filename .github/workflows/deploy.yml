name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            context: .
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            context: .
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
          - name: traffic-mcp
            context: ./traffic-mcp-server
            dockerfile: traffic-mcp-server/Dockerfile
            suffix: traffic-mcp
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:latest
          no-cache: true

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Verificar secrets SSH
        id: check
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Secret VPS_HOST nao configurado - deploy na VPS ignorado. Configure em Settings > Secrets > Actions."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: SSH - Pull e atualizar servicos
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            STACK="lustosaadvogados"

            echo "Pulling novas imagens do Docker Hub..."
            docker pull andreflustosa/chat-crm-juridico-api:latest
            docker pull andreflustosa/chat-crm-juridico-web:latest
            docker pull andreflustosa/chat-crm-juridico-worker:latest
            docker pull andreflustosa/chat-crm-juridico-traffic-mcp:latest

            echo "Limpando imagens Docker nao utilizadas..."
            docker image prune -f

            if docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null | grep -q "active"; then
              echo "Modo Swarm - atualizando services sequencialmente..."

              update_service() {
                local image="$1"
                shift
                local service_name=""

                for candidate in "$@"; do
                  if docker service ls --format '{{.Name}}' | grep -qx "$candidate"; then
                    service_name="$candidate"
                    break
                  fi
                done

                if [ -z "$service_name" ]; then
                  echo "::warning::Nenhum servico encontrado para $image. Candidatos: $*"
                  return 0
                fi

                echo "Atualizando $service_name -> $image"
                docker service update \
                  --image "$image" \
                  --with-registry-auth --force \
                  --update-parallelism 1 \
                  --update-delay 5s \
                  --detach=false \
                  "$service_name"
              }

              update_service \
                andreflustosa/chat-crm-juridico-api:latest \
                "${STACK}_api" "${STACK}_crm-api" "crm-api"

              update_service \
                andreflustosa/chat-crm-juridico-web:latest \
                "${STACK}_web" "${STACK}_crm-web" "crm-web"

              update_service \
                andreflustosa/chat-crm-juridico-worker:latest \
                "${STACK}_worker" "${STACK}_crm-worker" "crm-worker"

              update_service \
                andreflustosa/chat-crm-juridico-traffic-mcp:latest \
                "${STACK}_traffic-mcp-server" "traffic-mcp-server"

              docker image prune -f

              echo "Swarm atualizado!"
              docker service ls --format "table {{.Name}}\t{{.Image}}\t{{.Replicas}}" \
                | grep -E "${STACK}|crm-|traffic-mcp|NAME"
            else
              echo "Modo Compose - reiniciando containers..."
              STACK_DIR="/opt/stacks/${STACK}"
              if [ -d "$STACK_DIR" ]; then
                cd "$STACK_DIR"
                docker compose pull api worker web traffic-mcp-server
                docker compose up -d --no-deps --force-recreate api worker web traffic-mcp-server
              else
                docker restart crm-api crm-worker crm-web traffic-mcp-server 2>/dev/null || true
              fi
              echo "Containers atualizados!"
              docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" \
                | grep -E "crm-|traffic-mcp|NAMES"
            fi
