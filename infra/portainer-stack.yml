version: '3.8'

# ===============================================================
# NOTA IMPORTANTE — Portainer e fonte-da-verdade
# ===============================================================
# O Portainer mantem a PROPRIA copia deste yml (no volume dele).
# Push no repo NAO atualiza a stack em producao automaticamente —
# precisa colar este yml manualmente no painel do Portainer e
# clicar "Update the stack".
#
# Variaveis de ambiente definidas no painel do Portainer
# SOBRESCREVEM os defaults deste arquivo a cada restart. Se o
# login quebrar apos redeploy, checar se POSTGRES_DB/DATABASE_URL
# estao apontando para o banco correto (lustosa, nao lexcrm).
# Ver: memory/arquitetura_stacks_vps.md
# ===============================================================

services:
  # ------ Banco de Dados ------
  # IMPORTANTE: usa pgvector/pgvector:pg15 (NAO postgres:15-alpine) porque
  # o schema usa coluna `vector(1536)` no model Memory pra embeddings OpenAI.
  # Sem pgvector, prisma db push falha. Producao ja roda essa imagem desde
  # o setup do sistema de memoria (commit ~2026-04-18 do model Memory).
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}
      POSTGRES_DB: ${POSTGRES_DB:-lustosa}
    networks:
      - default
      - OrionNet
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    ports:
      - "46379:6379"
    networks:
      - default
      - OrionNet
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ MinIO (Mídias S3) ------
  minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - '49000:9000'
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    networks:
      - default
      - OrionNet
    volumes:
      - minio_data:/data
    deploy:
      restart_policy:
        condition: any

  # ------ Whisper Server (Transcrição de Audiências) ------
  # Primeiro boot baixa modelos (~5GB) em /models — cache persistente.
  # Deploy detalhado em apps/whisper/DEPLOY.md.
  crm-whisper:
    image: andreflustosa/chat-crm-juridico-whisper:latest
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - DEVICE=${WHISPER_DEVICE:-cpu}
      - COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - LANGUAGE=pt
      - DIARIZE=true
      - HF_TOKEN=${HF_TOKEN}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    networks:
      - default
      - OrionNet
    volumes:
      - whisper_models:/models
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Core API ------
  crm-api:
    image: andreflustosa/chat-crm-juridico-api:latest
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}@postgres:5432/${POSTGRES_DB:-lustosa}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET nao definido}
      - JWT_EXPIRES_IN=365d
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://andrelustosaadvogados.com.br}
      - WEBHOOK_HMAC_REQUIRED=${WEBHOOK_HMAC_REQUIRED:-false}
      # Armazenamento de mídia em filesystem local (novo fluxo — substitui MinIO)
      - MEDIA_STORAGE_PATH=/var/lib/crm-media
      # ─────────────────────────────────────────────────────────────────
      # Modulo de Trafego (Google Ads) — opcional
      # ─────────────────────────────────────────────────────────────────
      # Sem TRAFEGO_ENCRYPTION_KEY a API ainda sobe (modulo fica
      # desabilitado, retorna 503 em /trafego/oauth/start). Configure
      # essas envs no Portainer quando for habilitar o modulo.
      #
      # Gere a chave com: openssl rand -hex 32
      # FRONTEND_BASE_URL eh usado pra redirecionar apos OAuth callback.
      - TRAFEGO_ENCRYPTION_KEY=${TRAFEGO_ENCRYPTION_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-https://andrelustosaadvogados.com.br/api/trafego/oauth/callback}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN}
      - GOOGLE_ADS_LOGIN_CUSTOMER_ID=${GOOGLE_ADS_LOGIN_CUSTOMER_ID}
      - GOOGLE_ADS_CUSTOMER_ID=${GOOGLE_ADS_CUSTOMER_ID}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://andrelustosaadvogados.com.br}
      # Feature flag da IA interna do Trafego (decisions/policy/chat/optimization).
      # Quando 'false', interceptor global em apps/api/src/common/interceptors/
      # bloqueia esses endpoints com 503, e os crons da IA agente no worker
      # ficam dormentes. Use 'false' quando a gestao de trafego estiver
      # delegada ao Claude (Cowork via traffic-mcp-server).
      # Default: 'true' (preserva comportamento atual).
      - TRAFEGO_IA_INTERNA_ENABLED=${TRAFEGO_IA_INTERNA_ENABLED:-true}
    volumes:
      # Persiste áudios/documentos/imagens entre restarts do container.
      # Sem este volume, mídias são perdidas ao reiniciar o container.
      - crm_media:/var/lib/crm-media
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- API router (main domain) ---
        - "traefik.http.routers.crm-api.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.crm-api.service=crm-api"
        - "traefik.http.routers.crm-api.priority=100"
        - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.crm-api.middlewares=strip-api"
        - "traefik.http.services.crm-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-api.entrypoints=websecure"
        - "traefik.http.routers.crm-api.tls.certresolver=letsencryptresolver"
        # --- WebSocket router (main domain) ---
        - "traefik.http.routers.crm-ws.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.crm-ws.service=crm-ws"
        - "traefik.http.routers.crm-ws.priority=100"
        - "traefik.http.services.crm-ws.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-ws.entrypoints=websecure"
        - "traefik.http.routers.crm-ws.tls.certresolver=letsencryptresolver"
        - "traefik.docker.network=OrionNet"

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}@postgres:5432/${POSTGRES_DB:-lustosa}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - MEDIA_STORAGE_PATH=/var/lib/crm-media
      # ─────────────────────────────────────────────────────────────────
      # Modulo de Trafego (Google Ads) — worker precisa para sync diario
      # ─────────────────────────────────────────────────────────────────
      # Worker decripta refresh_token e troca por access_token a cada sync.
      # Sem essas envs, o cron 06h fica em STUB (sem chamar Google Ads API).
      - TRAFEGO_ENCRYPTION_KEY=${TRAFEGO_ENCRYPTION_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN}
      - GOOGLE_ADS_LOGIN_CUSTOMER_ID=${GOOGLE_ADS_LOGIN_CUSTOMER_ID}
      - GOOGLE_ADS_CUSTOMER_ID=${GOOGLE_ADS_CUSTOMER_ID}
      # Mesma flag do crm-api — quando false, crons da IA agente
      # (traffic-ai-agent-cron) ficam dormentes mesmo se BullMQ estiver up.
      # Detalhes: docs/mcp-server/fase-0-descoberta.md §10.
      - TRAFEGO_IA_INTERNA_ENABLED=${TRAFEGO_IA_INTERNA_ENABLED:-true}
    volumes:
      # Compartilha o MESMO volume do crm-api: worker precisa ler/escrever mídia
      # (TTS cria áudio, transcrição lê áudio, etc).
      - crm_media:/var/lib/crm-media
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any

  # ------ Next.js Frontend ------
  crm-web:
    image: andreflustosa/chat-crm-juridico-web:latest
    networks:
      - default
      - OrionNet
    ports:
      - "${WEB_PORT:-43000}:3000"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://andrelustosaadvogados.com.br}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://andrelustosaadvogados.com.br}
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- Web (main domain — LP + CRM) ---
        - "traefik.http.routers.crm-web.rule=Host(`andrelustosaadvogados.com.br`)"
        - "traefik.http.services.crm-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.crm-web.entrypoints=websecure"
        - "traefik.http.routers.crm-web.tls.certresolver=letsencryptresolver"
        # --- Redirect old atendimento subdomain → new path ---
        - "traefik.http.routers.crm-web-old.rule=Host(`atendimento.andrelustosaadvogados.com.br`)"
        - "traefik.http.routers.crm-web-old.entrypoints=websecure"
        - "traefik.http.routers.crm-web-old.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.regex=^https://atendimento\\.andrelustosaadvogados\\.com\\.br/(.*)"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.replacement=https://andrelustosaadvogados.com.br/atendimento/$${1}"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.permanent=true"
        - "traefik.http.routers.crm-web-old.middlewares=redirect-atendimento"
        - "traefik.docker.network=OrionNet"

  # ------ MCP Gestor de Trafego ------
  traffic-mcp-server:
    image: andreflustosa/chat-crm-juridico-traffic-mcp:latest
    environment:
      - MCP_PORT=3100
      - MCP_AUTH_TOKEN=${TRAFFIC_MCP_AUTH_TOKEN:?TRAFFIC_MCP_AUTH_TOKEN nao definido}
      - MCP_PUBLIC_BASE_URL=${TRAFFIC_MCP_PUBLIC_BASE_URL:-https://andrelustosaadvogados.com.br/traffic-mcp}
      - MCP_PUBLIC_URL=${TRAFFIC_MCP_PUBLIC_URL:-https://andrelustosaadvogados.com.br/traffic-mcp/mcp}
      - MCP_OAUTH_AUTHORIZATION_TOKEN=${TRAFFIC_MCP_OAUTH_AUTHORIZATION_TOKEN:-}
      # Lista CSV de redirect prefixes OAuth aceitos. Defaults cobrem ChatGPT
      # + Claude.ai + Cowork (Anthropic). Para forcar lista customizada use:
      # MCP_OAUTH_REDIRECT_PREFIXES=https://chatgpt.com/connector/oauth/,...
      - MCP_OAUTH_REDIRECT_PREFIXES=${TRAFFIC_MCP_OAUTH_REDIRECT_PREFIXES:-}
      # Origins permitidos no CORS (CSV). Default cobre os mesmos clientes.
      - MCP_CORS_ALLOWED_ORIGINS=${TRAFFIC_MCP_CORS_ALLOWED_ORIGINS:-}
      - TRAFFIC_MCP_MODE=crm
      - CRM_API_URL=${TRAFFIC_MCP_CRM_API_URL:-http://crm-api:3001}
      - CRM_API_KEY=${TRAFFIC_MCP_CRM_API_KEY:?TRAFFIC_MCP_CRM_API_KEY nao definido}
      - CACHE_TTL_MS=${TRAFFIC_MCP_CACHE_TTL_MS:-300000}
      # ─── Guard-rails operacionais (Fase 1 — Cowork) ─────────────────────
      # Kill switch: bloqueia TODA tool de mutate quando true. Read continua.
      - MCP_KILL_SWITCH=${TRAFFIC_MCP_KILL_SWITCH:-false}
      # Rate limit por janela de 1h (in-memory, per-instance).
      - MCP_MUTATE_RATE_LIMIT_PER_HOUR=${TRAFFIC_MCP_RATE_LIMIT_PER_HOUR:-60}
      # Hard cap absoluto em BRL/dia (rejeita budgets acima).
      - MCP_BUDGET_DAILY_HARD_CAP_BRL=${TRAFFIC_MCP_BUDGET_HARD_CAP_BRL:-1000}
      # Delta percentual maximo por update (rejeita acima).
      - MCP_BUDGET_CHANGE_MAX_PERCENT=${TRAFFIC_MCP_BUDGET_DELTA_MAX_PCT:-50}
      # Delta acima do qual exige confirm=true explicito do Claude.
      - MCP_BUDGET_REQUIRE_CONFIRM_PERCENT=${TRAFFIC_MCP_BUDGET_CONFIRM_PCT:-30}
      # Nivel de log estruturado JSON (debug/info/warn/error).
      - LOG_LEVEL=${TRAFFIC_MCP_LOG_LEVEL:-info}
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traffic-mcp.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/traffic-mcp`)"
        - "traefik.http.routers.traffic-mcp.service=traffic-mcp"
        - "traefik.http.routers.traffic-mcp.priority=110"
        - "traefik.http.middlewares.strip-traffic-mcp.stripprefix.prefixes=/traffic-mcp"
        - "traefik.http.routers.traffic-mcp.middlewares=strip-traffic-mcp"
        - "traefik.http.services.traffic-mcp.loadbalancer.server.port=3100"
        - "traefik.http.routers.traffic-mcp.entrypoints=websecure"
        - "traefik.http.routers.traffic-mcp.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.traffic-mcp-oauth-meta.rule=Host(`andrelustosaadvogados.com.br`) && (PathPrefix(`/.well-known/oauth-authorization-server`) || PathPrefix(`/.well-known/oauth-protected-resource`))"
        - "traefik.http.routers.traffic-mcp-oauth-meta.service=traffic-mcp"
        - "traefik.http.routers.traffic-mcp-oauth-meta.priority=120"
        - "traefik.http.routers.traffic-mcp-oauth-meta.entrypoints=websecure"
        - "traefik.http.routers.traffic-mcp-oauth-meta.tls.certresolver=letsencryptresolver"
        - "traefik.docker.network=OrionNet"

networks:
  OrionNet:
    external: true

volumes:
  pgdata_v2:
  redisdata:
  minio_data:
  # Modelos do Whisper (~5GB no primeiro boot — large-v3). Cache persistente
  # pra evitar re-download a cada redeploy.
  whisper_models:
  # Volume para mídias (áudios, documentos, imagens) do CRM.
  # Compartilhado entre crm-api (escreve+lê) e crm-worker (lê p/ TTS, transcrição).
  # Backup: adicionar /var/lib/docker/volumes/*_crm_media ao rsync da VPS.
  crm_media:
