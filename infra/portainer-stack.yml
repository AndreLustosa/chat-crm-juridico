version: '3.8'

# ===============================================================
# NOTA IMPORTANTE — Portainer e fonte-da-verdade
# ===============================================================
# O Portainer mantem a PROPRIA copia deste yml (no volume dele).
# Push no repo NAO atualiza a stack em producao automaticamente —
# precisa colar este yml manualmente no painel do Portainer e
# clicar "Update the stack".
#
# Variaveis de ambiente definidas no painel do Portainer
# SOBRESCREVEM os defaults deste arquivo a cada restart. Se o
# login quebrar apos redeploy, checar se POSTGRES_DB/DATABASE_URL
# estao apontando para o banco correto (lustosa, nao lexcrm).
# Ver: memory/arquitetura_stacks_vps.md
# ===============================================================

services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lustosa}
    networks:
      - default
      - OrionNet
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    ports:
      - "46379:6379"
    networks:
      - default
      - OrionNet
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ MinIO (Mídias S3) ------
  minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - '49000:9000'
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    networks:
      - default
      - OrionNet
    volumes:
      - minio_data:/data
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Core API ------
  crm-api:
    image: andreflustosa/chat-crm-juridico-api:latest
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lustosa}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=365d
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://andrelustosaadvogados.com.br}
      - WEBHOOK_HMAC_REQUIRED=${WEBHOOK_HMAC_REQUIRED:-false}
      # Armazenamento de mídia em filesystem local (novo fluxo — substitui MinIO)
      - MEDIA_STORAGE_PATH=/var/lib/crm-media
      # ─────────────────────────────────────────────────────────────────
      # Modulo de Trafego (Google Ads) — opcional
      # ─────────────────────────────────────────────────────────────────
      # Sem TRAFEGO_ENCRYPTION_KEY a API ainda sobe (modulo fica
      # desabilitado, retorna 503 em /trafego/oauth/start). Configure
      # essas envs no Portainer quando for habilitar o modulo.
      #
      # Gere a chave com: openssl rand -hex 32
      # FRONTEND_BASE_URL eh usado pra redirecionar apos OAuth callback.
      - TRAFEGO_ENCRYPTION_KEY=${TRAFEGO_ENCRYPTION_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-https://andrelustosaadvogados.com.br/api/trafego/oauth/callback}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN}
      - GOOGLE_ADS_LOGIN_CUSTOMER_ID=${GOOGLE_ADS_LOGIN_CUSTOMER_ID}
      - GOOGLE_ADS_CUSTOMER_ID=${GOOGLE_ADS_CUSTOMER_ID}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://andrelustosaadvogados.com.br}
    volumes:
      # Persiste áudios/documentos/imagens entre restarts do container.
      # Sem este volume, mídias são perdidas ao reiniciar o container.
      - crm_media:/var/lib/crm-media
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- API router (main domain) ---
        - "traefik.http.routers.crm-api.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.crm-api.service=crm-api"
        - "traefik.http.routers.crm-api.priority=100"
        - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.crm-api.middlewares=strip-api"
        - "traefik.http.services.crm-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-api.entrypoints=websecure"
        - "traefik.http.routers.crm-api.tls.certresolver=letsencryptresolver"
        # --- WebSocket router (main domain) ---
        - "traefik.http.routers.crm-ws.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.crm-ws.service=crm-ws"
        - "traefik.http.routers.crm-ws.priority=100"
        - "traefik.http.services.crm-ws.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-ws.entrypoints=websecure"
        - "traefik.http.routers.crm-ws.tls.certresolver=letsencryptresolver"
        - "traefik.docker.network=OrionNet"

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lustosa}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - MEDIA_STORAGE_PATH=/var/lib/crm-media
      # ─────────────────────────────────────────────────────────────────
      # Modulo de Trafego (Google Ads) — worker precisa para sync diario
      # ─────────────────────────────────────────────────────────────────
      # Worker decripta refresh_token e troca por access_token a cada sync.
      # Sem essas envs, o cron 06h fica em STUB (sem chamar Google Ads API).
      - TRAFEGO_ENCRYPTION_KEY=${TRAFEGO_ENCRYPTION_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_ADS_DEVELOPER_TOKEN=${GOOGLE_ADS_DEVELOPER_TOKEN}
      - GOOGLE_ADS_LOGIN_CUSTOMER_ID=${GOOGLE_ADS_LOGIN_CUSTOMER_ID}
      - GOOGLE_ADS_CUSTOMER_ID=${GOOGLE_ADS_CUSTOMER_ID}
    volumes:
      # Compartilha o MESMO volume do crm-api: worker precisa ler/escrever mídia
      # (TTS cria áudio, transcrição lê áudio, etc).
      - crm_media:/var/lib/crm-media
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any

  # ------ Next.js Frontend ------
  crm-web:
    image: andreflustosa/chat-crm-juridico-web:latest
    networks:
      - default
      - OrionNet
    ports:
      - "${WEB_PORT:-43000}:3000"
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://andrelustosaadvogados.com.br}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://andrelustosaadvogados.com.br}
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- Web (main domain — LP + CRM) ---
        - "traefik.http.routers.crm-web.rule=Host(`andrelustosaadvogados.com.br`)"
        - "traefik.http.services.crm-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.crm-web.entrypoints=websecure"
        - "traefik.http.routers.crm-web.tls.certresolver=letsencryptresolver"
        # --- Redirect old atendimento subdomain → new path ---
        - "traefik.http.routers.crm-web-old.rule=Host(`atendimento.andrelustosaadvogados.com.br`)"
        - "traefik.http.routers.crm-web-old.entrypoints=websecure"
        - "traefik.http.routers.crm-web-old.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.regex=^https://atendimento\\.andrelustosaadvogados\\.com\\.br/(.*)"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.replacement=https://andrelustosaadvogados.com.br/atendimento/$${1}"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.permanent=true"
        - "traefik.http.routers.crm-web-old.middlewares=redirect-atendimento"
        - "traefik.docker.network=OrionNet"

networks:
  OrionNet:
    external: true

volumes:
  pgdata_v2:
  redisdata:
  minio_data:
  # Volume para mídias (áudios, documentos, imagens) do CRM.
  # Compartilhado entre crm-api (escreve+lê) e crm-worker (lê p/ TTS, transcrição).
  # Backup: adicionar /var/lib/docker/volumes/*_crm_media ao rsync da VPS.
  crm_media:
